{% load static %}

<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon-16x16.png' %}">

    <!-- 2. Ikonki dla Androida (wysoka rozdzielczość na ekrany smartfonów) -->
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'android-chrome-192x192.png' %}">
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'android-chrome-512x512.png' %}">

    <!-- 3. Manifest aplikacji (Kluczowe dla Androida - definiuje nazwę i wygląd skrótu!) -->
    <link rel="manifest" href="{% static 'site.webmanifest' %}">

    <!-- 4. Opcjonalnie: Apple Touch Icon (warto dodać, Android czasem używa jej jako zapasowej) -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'apple-touch-icon.png' %}">

    <!-- 5. Opcjonalnie: Kolor paska przeglądarki Chrome na Androidzie (dopasuj do swojej strony) -->
    <meta name="theme-color" content="#ffffff">
    
    <style>
        /* Niestandardowe style dla poprawienia układu dashboardu */
        
        /* Sidebar: Na desktopie zajmuje 100% wysokości i jest przyklejony */
        .sidebar {
            min-height: 100vh;
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, .1);
        }

        /* Stylizacja linków w menu */
        .nav-link {
            color: rgba(255, 255, 255, .75);
        }
        .nav-link:hover, .nav-link.active {
            color: #fff;
            background-color: rgba(255,255,255,0.1);
            border-radius: 5px;
        }

        /* Karty modułowe - delikatne wyróżnienie cieniem */
        .dashboard-card {
            transition: transform 0.2s;
        }
        .dashboard-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.5)!important;
        }
    </style>
</head>
<body>
    {% block app_content %}
    {% endblock %}
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</html>
