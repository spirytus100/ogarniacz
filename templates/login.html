{% extends "base_auth.html" %}
{% load crispy_forms_tags %}

{% block app_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="text-center mb-4">Zaloguj się</h3>
                
                <form method="POST">
                    {% csrf_token %}
                    <!-- Magia dzieje się tutaj! Zamiast as_p używamy filtru crispy -->
                    {{ form|crispy }}
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">Zaloguj się</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
